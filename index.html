<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e8edf5">
<title>ARIA — AI Sekretarica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:linear-gradient(160deg,#dde3ef 0%,#e8edf5 50%,#d8e2f5 100%);
  --surface:linear-gradient(145deg,#f0f4fa,#e4e9f2);
  --sf:#eaf0f8;
  --card:linear-gradient(145deg,#f0f4fa,#e4e9f2);
  --sh:6px 6px 16px #c8cdd8,-4px -4px 12px #ffffff;
  --shs:4px 4px 10px #c8cdd8,-3px -3px 8px #ffffff;
  --shin:inset 3px 3px 8px #c0c5d0,inset -2px -2px 6px #ffffff;
  --tx:#2a3555;--txs:#8896b0;--txm:#aab5cc;
  --ac:#4f8ef7;--acg:rgba(79,142,247,0.45);
  --bub:linear-gradient(145deg,#f5f8ff,#e8eef8);
  --bubu:linear-gradient(135deg,#4f8ef7,#7ab8ff);
  --inp:linear-gradient(145deg,#e4e9f2,#eef2fa);
}
.dark{
  --bg:linear-gradient(160deg,#111827 0%,#1a1e2e 50%,#0f1628 100%);
  --surface:linear-gradient(145deg,#1e2436,#171b2a);
  --sf:#1a1f30;--card:linear-gradient(145deg,#1e2436,#171b2a);
  --sh:6px 6px 16px #0d1018,-4px -4px 12px #252b3d;
  --shs:4px 4px 10px #0d1018,-3px -3px 8px #252b3d;
  --shin:inset 3px 3px 8px #0d1018,inset -2px -2px 6px #252b3d;
  --tx:#e0e8ff;--txs:#6a7a9e;--txm:#3d4a68;
  --acg:rgba(79,142,247,0.5);
  --bub:linear-gradient(145deg,#1e2436,#171b2a);
  --bubu:linear-gradient(135deg,#3a7aec,#4f8ef7);
  --inp:linear-gradient(145deg,#171b2a,#1e2436);
}
.amoled{
  --bg:#000;--surface:linear-gradient(145deg,#0d0d0d,#070707);
  --sf:#0a0a0a;--card:linear-gradient(145deg,#111,#0a0a0a);
  --sh:6px 6px 16px #000,-4px -4px 12px #1a1a1a;
  --shs:4px 4px 10px #000,-3px -3px 8px #1a1a1a;
  --shin:inset 3px 3px 8px #000,inset -2px -2px 6px #1a1a1a;
  --tx:#fff;--txs:#555e78;--txm:#2a3050;
  --acg:rgba(79,142,247,0.6);
  --bub:linear-gradient(145deg,#111,#0a0a0a);
  --bubu:linear-gradient(135deg,#2a5fd4,#4f8ef7);
  --inp:linear-gradient(145deg,#0a0a0a,#111);
}
body{min-height:100dvh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:10px;font-family:'DM Sans',sans-serif;transition:background 0.4s;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#4f8ef740;border-radius:4px}

#app{width:100%;max-width:420px;height:min(790px,98dvh);background:var(--surface);border-radius:32px;
  box-shadow:20px 20px 50px rgba(0,0,0,0.18),-10px -10px 30px rgba(255,255,255,0.06);
  display:flex;flex-direction:column;overflow:hidden;animation:floatIn 0.45s ease;}

/* HEADER */
#header{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(170,181,204,0.15);flex-shrink:0;}
.avatar-wrap{position:relative;margin-right:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shs);
  display:flex;align-items:center;justify-content:center;font-size:20px;}
.online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;
  background:#4cd964;border:2px solid var(--sf);}
.header-info{flex:1;}
.header-name{font-family:'DM Serif Display',serif;font-size:17px;color:var(--tx);letter-spacing:-0.3px;}
.header-sub{font-size:10px;color:var(--txs);letter-spacing:0.3px;}
.header-right{display:flex;gap:7px;align-items:center;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#4cd964;box-shadow:0 0 6px #4cd96480;transition:all 0.3s;}
.conn-dot.off{background:#ff6b6b;box-shadow:0 0 6px #ff6b6b80;}
.mode-pill{padding:5px 11px;border-radius:20px;cursor:pointer;background:var(--card);box-shadow:var(--shs);
  color:var(--txs);font-size:11px;font-weight:600;transition:all 0.3s;white-space:nowrap;}
.mode-pill.active{background:linear-gradient(135deg,#4f8ef7,#7ab8ff);box-shadow:0 2px 10px #2a6bd4;color:#fff;}

/* NAV */
#nav{padding:8px 10px 12px;background:var(--surface);border-top:1px solid rgba(170,181,204,0.12);
  display:flex;justify-content:space-around;flex-shrink:0;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
  padding:5px 8px;border-radius:12px;background:transparent;transition:all 0.2s;border:none;font-family:'DM Sans',sans-serif;}
.nav-btn.active{background:rgba(79,142,247,0.12);}
.nav-icon{font-size:17px;line-height:1;}
.nav-label{font-size:9px;color:var(--txm);font-weight:400;letter-spacing:0.1px;}
.nav-btn.active .nav-label{color:#4f8ef7;font-weight:700;}

/* PAGES */
.page{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.page-scroll{flex:1;overflow-y:auto;padding:0 14px;}
.sec-label{font-size:10px;color:var(--txs);letter-spacing:1.2px;text-transform:uppercase;margin:10px 0 8px;}

/* CHAT */
#chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.aria{align-items:flex-start;}
.bubble{max-width:84%;padding:10px 14px;font-size:13px;line-height:1.55;box-shadow:var(--shs);}
.bubble.user{border-radius:18px 18px 4px 18px;background:var(--bubu);color:#fff;}
.bubble.aria{border-radius:18px 18px 18px 4px;background:var(--bub);color:var(--tx);}
.msg-meta{font-size:10px;margin-top:5px;display:flex;gap:5px;align-items:center;justify-content:flex-end;}
.bubble.user .msg-meta{color:rgba(255,255,255,0.6);}
.bubble.aria .msg-meta{color:var(--txm);}
.mode-tag{padding:1px 5px;border-radius:4px;font-weight:700;font-size:9px;}
.mode-tag.groq{background:rgba(79,142,247,0.15);color:#4f8ef7;}
.mode-tag.offline{background:rgba(247,165,79,0.15);color:#f7a54f;}
.tts-btn{cursor:pointer;opacity:0.6;font-size:11px;}
.action-card{margin-top:7px;border-radius:11px;padding:9px 13px;font-size:12px;
  color:var(--tx);border:1px solid rgba(79,142,247,0.2);background:var(--sf);box-shadow:var(--shs);cursor:pointer;}
.action-card a{color:#4f8ef7;font-weight:700;font-size:10px;text-decoration:none;
  padding:2px 8px;border-radius:5px;background:rgba(79,142,247,0.12);float:right;}
.typing{display:flex;gap:5px;align-items:center;padding:12px 16px;border-radius:18px 18px 18px 4px;
  background:var(--bub);box-shadow:var(--shs);width:fit-content;}
.dot{width:7px;height:7px;border-radius:50%;background:#4f8ef7;}

/* CHIPS */
#chips{padding:0 14px 6px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;}
#chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 11px;border-radius:20px;border:none;
  background:var(--card);box-shadow:var(--shs);color:var(--txs);font-size:11px;
  cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

/* INPUT BAR */
#input-bar{padding:4px 14px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.input-wrap{flex:1;display:flex;align-items:center;background:var(--inp);box-shadow:var(--shin);border-radius:22px;padding:0 14px;}
#msg-input{flex:1;border:none;background:transparent;font-size:13px;color:var(--tx);
  outline:none;padding:12px 0;font-family:'DM Sans',sans-serif;}
#msg-input::placeholder{color:var(--txs);opacity:0.6;}
.clear-btn{color:var(--txm);cursor:pointer;font-size:14px;padding:0 4px;display:none;}
.icon-btn{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:19px;cursor:pointer;transition:all 0.3s;border:none;font-family:'DM Sans',sans-serif;}
.icon-btn.mic{background:var(--card);box-shadow:var(--sh);}
.icon-btn.mic.active{background:linear-gradient(135deg,#4f8ef7,#7ab8ff);box-shadow:0 0 18px var(--acg),var(--sh);}
.icon-btn.tts-toggle{background:var(--card);box-shadow:var(--shs);}
.icon-btn.tts-toggle.active{background:linear-gradient(135deg,#4f8ef7,#7ab8ff);box-shadow:0 0 12px var(--acg);}
.icon-btn.send{background:linear-gradient(135deg,#4f8ef7,#7ab8ff);box-shadow:2px 2px 8px #2a6bd4;color:#fff;}
.pulse-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(79,142,247,0.4);animation:pulseRing 1.6s ease-out infinite;}

/* NOTES */
.cat-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 4px;margin-bottom:5px;}
.cat-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;}
.note-item{display:flex;align-items:center;gap:8px;background:var(--card);box-shadow:var(--shs);
  border-radius:10px;padding:9px 12px;margin-bottom:5px;}
.check-box{width:17px;height:17px;border-radius:4px;cursor:pointer;flex-shrink:0;
  border:2px solid var(--txm);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
.check-box.done{border-color:#4f8ef7;background:linear-gradient(135deg,#4f8ef7,#7ab8ff);}
.note-text{flex:1;font-size:12.5px;color:var(--tx);}
.note-text.done{text-decoration:line-through;opacity:0.45;}
.del-btn{color:var(--txm);cursor:pointer;font-size:13px;padding:0 3px;}
.add-row{display:flex;gap:6px;margin-bottom:4px;}
.add-input{flex:1;border:none;background:var(--inp);box-shadow:var(--shin);border-radius:10px;
  padding:7px 11px;font-size:12px;color:var(--tx);outline:none;font-family:'DM Sans',sans-serif;}
.add-btn{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:16px;cursor:pointer;color:#fff;border:none;}

/* ALARMS */
.alarm-card{display:flex;align-items:center;gap:10px;background:var(--card);box-shadow:var(--sh);
  border-radius:16px;padding:12px 14px;margin-bottom:10px;transition:all 0.3s;}
.alarm-card.on{box-shadow:5px 5px 14px var(--acg),var(--shs);}
.alarm-time{font-size:22px;font-weight:700;color:var(--txm);font-family:'DM Serif Display',serif;line-height:1.1;}
.alarm-time.on{color:#4f8ef7;}
.alarm-label{font-size:13px;font-weight:600;color:var(--txs);}
.alarm-label.on{color:var(--tx);}
.day-pills{display:flex;gap:3px;margin-top:3px;}
.day-pill{width:21px;height:21px;border-radius:6px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:8.5px;font-weight:700;background:var(--inp);color:var(--txm);
  box-shadow:var(--shin);transition:all 0.2s;}
.day-pill.on{background:#4f8ef7;color:#fff;box-shadow:1px 1px 4px var(--acg);}
.ai-badge{font-size:9px;color:#4f8ef7;background:rgba(79,142,247,0.12);padding:1px 5px;border-radius:3px;display:inline-block;margin-top:2px;}
.toggle{width:44px;height:25px;border-radius:12px;cursor:pointer;position:relative;
  transition:all 0.3s;background:var(--inp);box-shadow:var(--shin);}
.toggle.on{background:linear-gradient(135deg,#4f8ef7,#a0c4ff);box-shadow:inset 2px 2px 5px #2a6bd4;}
.toggle-knob{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;
  background:linear-gradient(145deg,#fff,#e0e5f0);box-shadow:1px 1px 4px rgba(0,0,0,0.2);transition:left 0.3s;}
.reminder-card{display:flex;align-items:center;gap:10px;background:var(--card);box-shadow:var(--shs);
  border-radius:13px;padding:10px 13px;margin-bottom:7px;transition:opacity 0.3s;}
.reminder-card.done{opacity:0.45;}
.prio-tag{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:700;white-space:nowrap;}
.prio-HIGH{background:rgba(255,107,107,0.15);color:#ff6b6b;}
.prio-MEDIUM{background:rgba(79,142,247,0.15);color:#4f8ef7;}
.prio-LOW{background:rgba(76,217,100,0.15);color:#4cd964;}

/* CALENDAR */
.event-card{display:flex;gap:10px;background:var(--card);box-shadow:var(--sh);
  border-radius:15px;padding:12px 14px;margin-bottom:9px;}
.event-dot{width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:17px;}

/* SETTINGS */
.settings-section{background:var(--card);box-shadow:var(--sh);border-radius:16px;padding:12px;margin-bottom:14px;}
.seg-btns{display:flex;gap:7px;}
.seg-btn{flex:1;padding:9px 0;border-radius:11px;text-align:center;cursor:pointer;
  font-size:11.5px;font-weight:400;background:var(--inp);box-shadow:var(--shin);
  color:var(--txs);transition:all 0.25s;border:none;font-family:'DM Sans',sans-serif;}
.seg-btn.active{background:linear-gradient(135deg,#4f8ef7,#7ab8ff);box-shadow:0 3px 12px #2a6bd4;color:#fff;font-weight:700;}
.status-bar{padding:7px 10px;border-radius:9px;font-size:11px;margin-top:10px;}
.status-bar.online{background:rgba(76,217,100,0.08);border:1px solid rgba(76,217,100,0.22);color:#4cd964;}
.status-bar.offline{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.22);color:#ff6b6b;}
.key-row{display:flex;gap:7px;margin-top:10px;}
.key-input{flex:1;border:none;background:var(--inp);box-shadow:var(--shin);border-radius:9px;
  padding:8px 11px;font-size:12px;color:var(--tx);outline:none;font-family:monospace;}
.save-btn{padding:0 13px;height:34px;border-radius:9px;background:linear-gradient(135deg,#4f8ef7,#7ab8ff);
  box-shadow:2px 2px 8px #2a6bd4;display:flex;align-items:center;font-size:11px;
  color:#fff;cursor:pointer;font-weight:700;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.hint{font-size:10px;color:var(--txm);margin-top:5px;}
.contact-row{display:flex;align-items:center;gap:9px;padding:7px 0;
  border-bottom:1px solid rgba(170,181,204,0.12);}
.mem-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;
  border-bottom:1px solid rgba(170,181,204,0.1);}
.calc-row{display:flex;justify-content:space-between;padding:5px 0;
  border-bottom:1px solid rgba(170,181,204,0.1);font-size:12px;}

@keyframes floatIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%{transform:scale(0.85);opacity:0.7}100%{transform:scale(1.7);opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.dot:nth-child(1){animation:bounce 1s ease 0s infinite;}
.dot:nth-child(2){animation:bounce 1s ease 0.15s infinite;}
.dot:nth-child(3){animation:bounce 1s ease 0.3s infinite;}

input[type=time]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer;}
input::placeholder{opacity:0.55;}
b{font-weight:600;}em{font-style:italic;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;">
      <div class="avatar-wrap">
        <div class="avatar">👩‍💼</div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name">ARIA</div>
        <div class="header-sub" id="header-sub">📴 Offline · --:--</div>
      </div>
    </div>
    <div class="header-right">
      <div class="conn-dot off" id="conn-dot"></div>
      <div class="mode-pill" id="mode-pill" onclick="goPage('settings')">📴 Offline</div>
    </div>
  </div>

  <div class="page" id="page-chat" style="display:flex;">
    <div id="chat-msgs"></div>
    <div id="chips">
      <button class="chip" onclick="chipClick('Postavi alarm za sutra u 8')">⏰ Alarm</button>
      <button class="chip" onclick="chipClick('Podseti me da ')">🔔 Podsetnik</button>
      <button class="chip" onclick="chipClick('Imam sastanak ')">📅 Sastanak</button>
      <button class="chip" onclick="chipClick('Kupi ')">🛒 Kupovina</button>
      <button class="chip" onclick="chipClick('Koliko je ')">🧮 Računaj</button>
      <button class="chip" onclick="chipClick('Kakvo je vreme u Beogradu')">🌤️ Vreme</button>
      <button class="chip" onclick="chipClick('Pretraži ')">🔍 Traži</button>
      <button class="chip" onclick="chipClick('Pozovi ')">📞 Pozovi</button>
    </div>
    <div id="input-bar">
      <div class="input-wrap">
        <input id="msg-input" placeholder="Reci ili piši komandu..." autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()">
        <span class="clear-btn" id="clear-btn" onclick="clearInput()">✕</span>
      </div>
      <div class="icon-btn mic" id="mic-btn" onclick="toggleMic()" style="position:relative;">🎤</div>
      <button class="icon-btn tts-toggle active" id="tts-btn" onclick="toggleTTS()">🔈</button>
      <button class="icon-btn send" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <div class="page" id="page-notes" style="display:none;">
    <div class="page-scroll" id="notes-content"></div>
  </div>

  <div class="page" id="page-alarms" style="display:none;">
    <div class="page-scroll" id="alarms-content"></div>
  </div>

  <div class="page" id="page-calendar" style="display:none;">
    <div class="page-scroll" id="calendar-content"></div>
  </div>

  <div class="page" id="page-settings" style="display:none;">
    <div class="page-scroll" id="settings-content"></div>
  </div>

  <div id="nav">
    <button class="nav-btn active" id="nav-chat" onclick="goPage('chat')">
      <span class="nav-icon">💬</span><span class="nav-label">Chat</span>
    </button>
    <button class="nav-btn" id="nav-notes" onclick="goPage('notes')">
      <span class="nav-icon">📝</span><span class="nav-label">Beleške</span>
    </button>
    <button class="nav-btn" id="nav-alarms" onclick="goPage('alarms')">
      <span class="nav-icon">⏰</span><span class="nav-label">Alarmi</span>
    </button>
    <button class="nav-btn" id="nav-calendar" onclick="goPage('calendar')">
      <span class="nav-icon">📅</span><span class="nav-label">Kalendar</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="goPage('settings')">
      <span class="nav-icon">⚙️</span><span class="nav-label">Podešavanja</span>
    </button>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().split('T')[0];
const tomorrowStr=()=>new Date(Date.now()+86400000).toISOString().split('T')[0];
const fmtTime=()=>new Date().toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'});
const fmtDate=d=>new Date(d).toLocaleDateString('sr-RS',{weekday:'short',day:'numeric',month:'short'});

let STATE={
  theme:'light', aiMode:'offline',
  groqKey: localStorage.getItem('aria_groq_key')||'',
  ttsEnabled:true, isSpeaking:false, micActive:false, loading:false,
  isOnline:navigator.onLine, currentPage:'chat',
  messages:[{id:uid(),role:'aria',time:fmtTime(),
    content:'Zdravo! Ja sam <b>ARIA</b>, tvoja AI sekretarica. 👋<br><br>Reci mi šta treba — alarm, podsetnik, beleška, kalkulator, vreme... Razumem prirodan govor! 😊',
    mode:null}],
  alarms:[
    {id:uid(),label:'Morning Workout',time:'08:00',on:false,days:[0,0,0,0,1,1,1,0,0],createdByAI:false},
    {id:uid(),label:'Client Call',time:'14:30',on:true,days:[0,0,0,0,0,0,0],createdByAI:false},
  ],
  reminders:[
    {id:uid(),title:'Kupi hleb i mleko',date:tomorrowStr(),time:'17:00',done:false,priority:'MEDIUM'},
    {id:uid(),title:'Platiti račun za struju',date:tomorrowStr(),time:'10:00',done:false,priority:'HIGH'},
  ],
  notes:{
    ideas:[{id:uid(),content:'Nova app ideja',done:false}],
    todo:[{id:uid(),content:'Poziv sa timom',done:false},{id:uid(),content:'Pregledati izveštaj',done:false}],
    meeting:[{id:uid(),content:'Beleške sa ponedeljka',done:false}],
    shopping:[{id:uid(),content:'Mleko',done:false},{id:uid(),content:'Med bagremov',done:false},{id:uid(),content:'Hleb',done:true}],
  },

function speak(text){
  if(!window.speechSynthesis||!STATE.ttsEnabled)return;
  window.speechSynthesis.cancel();
  const plain=text.replace(/<[^>]+>/g,'').replace(/\*\*/g,'').replace(/\*/g,'').slice(0,150);
  const u=new SpeechSynthesisUtterance(plain);
  u.lang='sr-RS';u.rate=0.95;u.pitch=1.05;
  const vs=speechSynthesis.getVoices();
  const pref=vs.find(v=>v.lang.startsWith('sr')||v.lang.startsWith('hr'));
  if(pref)u.voice=pref;
  u.onstart=()=>{STATE.isSpeaking=true;updateHeader();};
  u.onend=()=>{STATE.isSpeaking=false;updateHeader();};
  speechSynthesis.speak(u);
}
function toggleTTS(){
  STATE.ttsEnabled=!STATE.ttsEnabled;

  else{btn.classList.remove('active');btn.textContent='🔇';speechSynthesis.cancel();}
}

// ─── OFFLINE NLP ──────────────────────────────────────────────────────────────
function parseTimeStr(s){
  let m;
  if((m=s.match(/(\d{1,2})[:\.](\d{2})/)))return m[1].padStart(2,'0')+':'+m[2];
  if((m=s.match(/(\d{1,2})\s*(h|sat|čas|am|pm)/i))){
    let h=parseInt(m[1]);
    if(/pm/i.test(m[2])&&h<12)h+=12;
    if(/am/i.test(m[2])&&h===12)h=0;
    return String(h).padStart(2,'0')+':00';
  }
  if(/pola\s*osam|sedam\s*i\s*po/i.test(s))return'07:30';
  if(/pola\s*devet|osam\s*i\s*po/i.test(s))return'08:30';
  if(/pola\s*deset/i.test(s))return'09:30';
  if(/pola\s*dva/i.test(s))return'13:30';
  if(/pola\s*tri/i.test(s))return'14:30';
  if(/podne|noon/i.test(s))return'12:00';
  if(/ponoć|midnight/i.test(s))return'00:00';
  return null;
}
function parseDateStr(s){
  const d=new Date();
  if(/sutra|tomorrow/i.test(s)){d.setDate(d.getDate()+1);return d;}
  if(/prekosutra/i.test(s)){d.setDate(d.getDate()+2);return d;}
  if(/danas|today/i.test(s))return d;
  const mm=s.match(/za\s*(\d+)\s*dan/i);
  if(mm){d.setDate(d.getDate()+parseInt(mm[1]));return d;}
  const dsr=['ned','pon','uto','sre','čet','pet','sub'];
  const den=['sun','mon','tue','wed','thu','fri','sat'];
  for(let i=0;i<7;i++){
    if(s.includes(dsr[i])||s.includes(den[i])){
      const curr=d.getDay();let diff=i-curr;if(diff<=0)diff+=7;
      d.setDate(d.getDate()+diff);return d;
    }
  }
  return d;
}
function calcExpr(text){
  const m=text.match(/[\d\s\+\-\*\/\.\(\)%]+/);
  if(!m)return null;
  try{
    const expr=m[0].trim().replace(/\s+/g,'').replace(/%/g,'*0.01');
    if(!/^[\d\+\-\*\/\.\(\)]+$/.test(expr))return null;
    // eslint-disable-next-line no-new-func
    const r=new Function('return '+expr)();
    if(isNaN(r)||!isFinite(r))return null;
    return{expr:m[0].trim(),result:parseFloat(r.toFixed(8))};
  }catch{return null;}
}

function offlineNLP(text){
  const t=text.toLowerCase().trim();
  const timeStr=parseTimeStr(t);
  const dateObj=parseDateStr(t);
  const dateISO=dateObj.toISOString().split('T')[0];
  const dateLabel=dateObj.toLocaleDateString('sr-RS',{weekday:'long',day:'numeric',month:'long'});
  const td=timeStr||'?';

  if(/koliko\s*(je|ima)|\d+\s*[\+\-\*\/]\s*\d+|izračunaj|kalkulator/i.test(t)){
    const c=calcExpr(t);
    if(c)return{intent:'CALC',extracted:{expr:c.expr,result:c.result},
      response:`🧮 <b>${c.expr} = ${c.result}</b>`};
  }
  if(/vreme|prognoza|temperatura|weather|kiša|sneg|oblačno|sunčano/i.test(t)){
    const cm=t.match(/(u|in)\s+([a-zšđžčć]+)/i);
    const city=cm?cm[2]:'Beograd';
    return{intent:'WEATHER',extracted:{city},
      response:`🌤️ Tražim prognozu za <b>${city}</b>...`,link:`https://www.google.com/search?q=vreme+${encodeURIComponent(city)}`};
  }
  if(/pretraži|guglaj|nađi na internetu|search|šta je|ko je/i.test(t)){
    const q=t.replace(/pretraži|guglaj|nađi na internetu|search for/gi,'').trim();
    return{intent:'SEARCH',extracted:{query:q},
      response:`🔍 Pretražujem: <b>"${q}"</b>`,link:`https://www.google.com/search?q=${encodeURIComponent(q)}`};
  }
  if(/pozovi|zovi|nazovi|call\s/i.test(t)){
    const nm=t.match(/(pozovi|zovi|nazovi|call)\s+(\w+)/i);
    const name=nm?nm[2]:'kontakt';
    const c=STATE.contacts.find(x=>x.name.toLowerCase().includes(name.toLowerCase()));
    return{intent:'CALL',extracted:{person:name,phone:c?.phone,found:!!c},
      response:`📞 Pozivam <b>${name}</b>${c?` · ${c.phone}`:'— nije u kontaktima'}...`};
  }
  if(/pošalji\s*poruku|sms\s|poruka\s*za/i.test(t)){
    const tm=t.match(/(za|to)\s+(\w+)/i);
    const msgm=t.match(/[""'](.+)[""']/);
    const person=tm?tm[2]:'';
    const c=STATE.contacts.find(x=>x.name.toLowerCase().includes(person.toLowerCase()));
    return{intent:'SMS',extracted:{person,phone:c?.phone,message:msgm?msgm[1]:''},
      response:`💬 Poruka za <b>${person||'kontakt'}</b>${msgm?`: <i>"${msgm[1]}"</i>`:''}`};
  }
  if(/probudi|alarm\s|ustaj|wake/i.test(t)){
    return{intent:'ALARM',extracted:{title:'Alarm '+td,time:timeStr,date:dateISO},
      response:timeStr?`⏰ Alarm postavljen za <b>${td}</b> (${dateLabel})! 🌅`:`U koje vreme da te probudim?`,
      missing:timeStr?[]:['time']};
  }
  if(/podseti|podsetnik|ne zaboravi|don't forget/i.test(t)){
    const what=t.replace(/podseti\s*(me)?\s*(da)?/gi,'').trim()||'zadatak';
    return{intent:'REMINDER',extracted:{title:what,time:timeStr,date:dateISO,priority:'MEDIUM'},
      response:`🔔 Podsetnik "<b>${what}</b>" za <b>${dateLabel}</b>${timeStr?' u '+td:''}! ✅`};
  }
  if(/sastanak|meeting|termin|događaj\s|event\s/i.test(t)){
    const pm=t.match(/sa?\s+([A-ZŠĐŽČĆ][a-zšđžčć]+)/i);
    const title=pm?`Sastanak sa ${pm[1]}`:'Sastanak';
    return{intent:'CALENDAR',extracted:{title,time:timeStr,date:dateISO,person:pm?pm[1]:null,color:'#4f8ef7'},
      response:`📅 <b>${title}</b> dodat u kalendar za <b>${dateLabel}</b>${timeStr?' u '+td:''}! 🗓️`};
  }
  if(/kupi\s|kupovina|lista\s*(kupovine)?|hleb|mleko|med\s|sir\s|jaja|kafa/i.test(t)){
    const item=t.replace(/kupi|dodaj na listu|shopping/gi,'').trim()||'stavka';
    return{intent:'SHOPPING',extracted:{title:item},
      response:`🛒 <b>"${item}"</b> dodato na listu kupovine!`};
  }
  if(/zapamti|beleška|zapiši|note\s|ideja|misao/i.test(t)){
    const content=t.replace(/zapamti|zapiši|beleška|note/gi,'').trim()||'nova beleška';
    return{intent:'NOTE',extracted:{title:content,category:'ideas'},
      response:`💡 Beleška sačuvana: <i>"${content}"</i>! ✍️`};
  }
  if(/zadatak|to-do|obaveza|moram da|treba da|platiti|plati/i.test(t)){
    const task=t.replace(/moram\s*(da)?|treba\s*(da)?|zadatak|obaveza/gi,'').trim()||'zadatak';
    const priority=/hitno|urgent|važno|asap/i.test(t)?'HIGH':'MEDIUM';
    return{intent:'TASK',extracted:{title:task,priority},
      response:`✅ Zadatak <b>"${task}"</b> dodat!${priority==='HIGH'?' 🔴 <i>Hitno</i>':''}`};
  }
  if(/zapamti.*mi.*je|omilj|volim\s|sviđa\s*mi/i.test(t)){
    const km=t.match(/mi\s*je?\s+omilj\w+\s+(\w+\s*\w*)/i);
    return{intent:'MEMORY',extracted:{key:km?`Omiljeni ${km[1]}`:'Preferencija',value:text.trim()},
      response:`🧠 Zapamtio sam: <b>"${text.trim()}"</b>! ✨`};
  }
  if(/zdravo|ćao|cao|pozdrav|hej|hi\b|hello|hallo|dobro jutro/i.test(t)){
    const mems=STATE.memories.slice(0,2).map(m=>`• ${m.key}: ${m.value}`).join('<br>');
    return{intent:'CHAT',extracted:{},
      response:`Zdravo! Ja sam <b>ARIA</b> 👋<br><br>Šta mogu da uradim?<br>• ⏰ Alarm/podsetnik<br>• 📅 Kalendar<br>• 📝 Beleška/zadatak<br>• 🛒 Kupovina<br>• 🧮 Kalkulator<br>• 🌤️ Vreme<br>• 🔍 Pretraga<br>• 📞 Poziv/SMS${mems?'<br><br>🧠 Znam o tebi:<br>'+mems:''}`};
  }
  return{intent:'CHAT',extracted:{},
    response:`Razumeo sam. Pokušaj:<br>• <i>"Probudi me sutra u 7:30"</i><br>• <i>"Koliko je 125 × 8?"</i><br>• <i>"Kakvo je vreme u Beogradu?"</i><br>• <i>"Podseti me da platim račun u petak"</i>`};
}

// ─── GROQ NLP ─────────────────────────────────────────────────────────────────
async function groqNLP(text){
  const todStr=todayStr();const tomStr=tomorrowStr();
  const now=new Date();
  const memCtx=STATE.memories.length?'\nKorisnikova memorija:\n'+STATE.memories.map(m=>`- ${m.key}: ${m.value}`).join('\n'):'';
  const sys=`Ti si ARIA, AI sekretarica. Danas: ${now.toLocaleDateString('sr-RS',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}, ${fmtTime()}.${memCtx}
Razumeš srpski, engleski i nemački. Vrati SAMO validan JSON:
{"intent":"ALARM|REMINDER|NOTE|CALENDAR|SHOPPING|TASK|MEMORY|CALC|WEATHER|SEARCH|CALL|SMS|CHAT","confidence":0.9,"extracted":{"title":"","time":"HH:MM ili null","date":"YYYY-MM-DD ili null","person":null,"location":null,"priority":"MEDIUM","category":null,"query":"","expr":"","result":null,"phone":null,"message":null},"missing":[],"response":"HTML odgovor sa <b>bold</b>","speak":"kratki tekst bez HTML za TTS"}
Pravila: sutra=${tomStr},danas=${todStr}; pola osam=07:30; izračunaj matematiku; predloži podsetnik za obaveze`;
  const msgs=STATE.messages.slice(-8).map(m=>({role:m.role==='aria'?'assistant':'user',content:m.content.replace(/<[^>]+>/g,'')}));
  msgs.push({role:'user',content:text});
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+STATE.groqKey},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:sys},...msgs],max_tokens:600,temperature:0.2}),
  });
  if(!res.ok)throw new Error('Groq '+res.status);
  const data=await res.json();
  const raw=data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
  return JSON.parse(raw);
}

// ─── HANDLE INTENT ────────────────────────────────────────────────────────────
function handleIntent(result){
  const{intent,extracted,link}=result;
  let ac=null;
  if(intent==='ALARM'&&extracted.time){
    const a={id:uid(),label:extracted.title||'Alarm',time:extracted.time,on:true,days:[0,0,0,0,0,0,0],createdByAI:true};
    STATE.alarms.unshift(a);ac={type:'alarm',data:a};
  }else if(intent==='REMINDER'){
    const r={id:uid(),title:extracted.title||'Podsetnik',date:extracted.date||todayStr(),time:extracted.time||'09:00',done:false,priority:extracted.priority||'MEDIUM'};
    STATE.reminders.unshift(r);ac={type:'reminder',data:r};
  }else if(intent==='NOTE'){
    const cat=extracted.category||'ideas';
    STATE.notes[cat].unshift({id:uid(),content:extracted.title||'Beleška',done:false});
    ac={type:'note',data:{category:cat,content:extracted.title}};
  }else if(intent==='CALENDAR'){
    const ev={id:uid(),title:extracted.title||'Događaj',date:extracted.date||todayStr(),time:extracted.time||'10:00',person:extracted.person||null,color:extracted.color||'#4f8ef7'};
    STATE.events.unshift(ev);ac={type:'event',data:ev};
  }else if(intent==='SHOPPING'){
    STATE.notes.shopping.unshift({id:uid(),content:extracted.title||'Stavka',done:false});
    ac={type:'shopping',data:{content:extracted.title}};
  }else if(intent==='TASK'){
    STATE.notes.todo.unshift({id:uid(),content:extracted.title||'Zadatak',done:false});
    ac={type:'task',data:{content:extracted.title,priority:extracted.priority}};
  }else if(intent==='MEMORY'){
    const kv={id:uid(),key:extracted.key||'Info',value:extracted.value||''};
    STATE.memories=STATE.memories.filter(m=>m.key!==kv.key);
    STATE.memories.unshift(kv);ac={type:'memory',data:kv};
  }else if(intent==='CALC'){
    const ch={id:uid(),expr:extracted.expr,result:extracted.result,time:fmtTime()};
    STATE.calcHistory.unshift(ch);STATE.calcHistory=STATE.calcHistory.slice(0,20);
    ac={type:'calc',data:ch};
  }else if(intent==='CALL'){
    const c=STATE.contacts.find(x=>x.name.toLowerCase().includes((extracted.person||'').toLowerCase()));
    ac={type:'call',data:{person:extracted.person,phone:c?.phone||extracted.phone,found:!!c}};
  }else if(intent==='SMS'){
    const c=STATE.contacts.find(x=>x.name.toLowerCase().includes((extracted.person||'').toLowerCase()));
    ac={type:'sms',data:{person:extracted.person,phone:c?.phone||extracted.phone,message:extracted.message,found:!!c}};
  }else if(intent==='WEATHER'||intent==='SEARCH'){
    const city=extracted.city||extracted.location||extracted.query||'';
    ac={type:intent.toLowerCase(),data:{city,query:city},link:result.link||link||''};
  }
  return ac;
}

// ─── RENDER ACTION CARD ───────────────────────────────────────────────────────
function renderActionCard(ac){
  if(!ac)return'';
  const wrap=(inner,onclick='')=>`<div class="action-card"${onclick?` onclick="${onclick}"`:''}>${inner}</div>`;
  const goto=(label,page)=>`<a onclick="goPage('${page}')">${label}</a>`;
  if(ac.type==='alarm')return wrap(`⏰ <b>Alarm kreiran:</b> ${ac.data.label} — <span style="color:#4f8ef7;font-weight:700">${ac.data.time}</span>${goto('Alarmi →','alarms')}`,'goPage(\'alarms\')');
  if(ac.type==='reminder')return wrap(`🔔 <b>Podsetnik:</b> ${ac.data.title} — <span style="color:#4f8ef7">${fmtDate(ac.data.date)} ${ac.data.time}</span> <span class="prio-tag prio-${ac.data.priority}">${ac.data.priority}</span>`,'goPage(\'alarms\')');
  if(ac.type==='event')return wrap(`📅 <b>${ac.data.title}</b> — <span style="color:#4f8ef7">${fmtDate(ac.data.date)} ${ac.data.time}</span>${ac.data.person?` · 👤 ${ac.data.person}`:''}${goto('Kalendar →','calendar')}`,'goPage(\'calendar\')');
  if(ac.type==='note'||ac.type==='task')return wrap(`${ac.type==='task'?'✅':'💡'} <b>${ac.type==='task'?'Zadatak':'Beleška'}:</b> ${ac.data.content||ac.data.title||''}${ac.data.priority==='HIGH'?' <span style="color:#ff6b6b">🔴 Hitno</span>':''}${goto('Beleške →','notes')}`,'goPage(\'notes\')');
  if(ac.type==='shopping')return wrap(`🛒 <b>Kupovina:</b> ${ac.data.content}${goto('Lista →','notes')}`,'goPage(\'notes\')');
  if(ac.type==='memory')return wrap(`🧠 <b>Zapamćeno:</b> <i>${ac.data.key}</i> → ${ac.data.value}`);
  if(ac.type==='calc')return`<div class="action-card" style="text-align:center">🧮 <span style="font-size:16px;font-weight:700;color:#4f8ef7">${ac.data.expr} = <b>${ac.data.result}</b></span></div>`;
  if(ac.type==='call'){
    const btn=ac.data.phone?`<a href="tel:${(ac.data.phone||'').replace(/\s/g,'')}">📞 Pozovi</a>`:'';
    return wrap(`📞 <b>${ac.data.person}</b>${ac.data.phone?` · <span style="color:var(--txs)">${ac.data.phone}</span>`:'<span style="color:#f7a54f"> — nije u kontaktima</span>'}${btn}`);
  }
  if(ac.type==='sms'){
    const smsUrl=ac.data.phone?`sms:${(ac.data.phone||'').replace(/\s/g,'')}${ac.data.message?'?body='+encodeURIComponent(ac.data.message):''}`:null;
    return wrap(`💬 <b>${ac.data.person||''}</b>${ac.data.phone?` · ${ac.data.phone}`:''}${ac.data.message?`<div style="margin-top:3px;font-style:italic;color:var(--txs)">"${ac.data.message}"</div>`:''}`+(smsUrl?`<a href="${smsUrl}">💬 SMS</a>`:''));
  }
  if(ac.type==='weather'){
    const url=ac.link||`https://www.google.com/search?q=vreme+${encodeURIComponent(ac.data.city||'')}`;
    return wrap(`🌤️ <b>Prognoza za ${ac.data.city}</b><a href="${url}" target="_blank">🌐 Otvori</a>`);
  }
  if(ac.type==='search'){
    const url=ac.link||`https://www.google.com/search?q=${encodeURIComponent(ac.data.query||'')}`;
    return wrap(`🔍 <b>Pretraga:</b> ${ac.data.query}<a href="${url}" target="_blank">🌐 Google</a>`);
  }
  return'';
}

async function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=(inp.value||'').trim();
  if(!text||STATE.loading)return;
  inp.value='';document.getElementById('clear-btn').style.display='none';
  const userMsg={id:uid(),role:'user',content:text,time:fmtTime(),mode:null};
  STATE.messages.push(userMsg);
  renderChat();
  STATE.loading=true;renderLoading(true);
  try{
    let result;
    const eff=(STATE.aiMode==='groq'&&STATE.groqKey&&STATE.isOnline)?'groq':'offline';
    if(eff==='groq'){result=await groqNLP(text);}
    else{await new Promise(r=>setTimeout(r,320));result=offlineNLP(text);}
    const ac=handleIntent(result);
    const ariaMsg={id:uid(),role:'aria',content:result.response||'✅',time:fmtTime(),mode:eff,actionCard:ac};
    STATE.messages.push(ariaMsg);
    if(STATE.ttsEnabled){speak(result.speak||result.response||'');}
    renderChat();
  }catch(e){
    const fb=offlineNLP(text);
    const ac=handleIntent(fb);
    STATE.messages.push({id:uid(),role:'aria',content:`⚠️ <i>Groq greška — offline mod.</i><br><br>${fb.response}`,time:fmtTime(),mode:'offline',actionCard:ac});
    renderChat();
  }finally{STATE.loading=false;renderLoading(false);}
}

let recognition=null;
function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('Glasovni unos nije podržan. Koristi Chrome.');return;
  }
  if(STATE.micActive){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.continuous=false;recognition.interimResults=true;recognition.lang='sr-RS';
  let final='';
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('msg-input').value=t;
    document.getElementById('clear-btn').style.display=t?'flex':'none';
    if(e.results[e.results.length-1].isFinal)final=t;
  };
  recognition.onend=()=>{
    STATE.micActive=false;updateMicBtn();
    if(final){sendMsg();}
  };
  recognition.onerror=()=>{STATE.micActive=false;updateMicBtn();};
  recognition.start();STATE.micActive=true;updateMicBtn();
}
function updateMicBtn(){
  const btn=document.getElementById('mic-btn');
  btn.classList.toggle('active',STATE.micActive);
  btn.textContent=STATE.micActive?'🎙️':'🎤';
  // remove old rings
  btn.querySelectorAll('.pulse-ring').forEach(e=>e.remove());
  if(STATE.micActive){
    [1,2].forEach(i=>{
      const r=document.createElement('div');
      r.className='pulse-ring';
      r.style.cssText=`width:${44+i*16}px;height:${44+i*16}px;top:${-i*8}px;left:${-i*8}px;animation-delay:${i*0.3}s;`;
      btn.appendChild(r);
    });
  }
}

function renderChat(){
  const container=document.getElementById('chat-msgs');
  container.innerHTML=STATE.messages.map(m=>{
    const isUser=m.role==='user';
    const modeTag=m.mode?`<span class="mode-tag ${m.mode}">${m.mode==='groq'?'🤖 Groq':'📴 Offline'}</span>`:'';
    const ttsIcon=!isUser?`<span class="tts-btn" onclick="speak('${m.content.replace(/'/g,"\\'").replace(/<[^>]+>/g,'').slice(0,200)}')">🔊</span>`:'';
    const ac=m.actionCard?renderActionCard(m.actionCard):'';
    return`<div class="msg-wrap ${isUser?'user':'aria'}" style="animation:floatIn 0.3s ease">
      <div class="bubble ${isUser?'user':'aria'}">${m.content}
        <div class="msg-meta">${modeTag}${m.time}${ttsIcon}</div>
      </div>${ac}
    </div>`;
  }).join('');
  container.scrollTop=container.scrollHeight;
}
function renderLoading(show){
  let el=document.getElementById('loading-indicator');
  if(show&&!el){
    el=document.createElement('div');el.id='loading-indicator';
    el.className='msg-wrap aria';el.style.animation='floatIn 0.3s ease';
    el.innerHTML=`<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    document.getElementById('chat-msgs').appendChild(el);
    document.getElementById('chat-msgs').scrollTop=99999;
  }else if(!show&&el){el.remove();}
}

// ─── RENDER NOTES ─────────────────────────────────────────────────────────────
function renderNotes(){
  const cats=[
    {key:'ideas',icon:'💡',label:'Ideje',color:'#f7c94f'},
    {key:'todo',icon:'✅',label:'To-Do',color:'#4f8ef7'},
    {key:'meeting',icon:'🗒️',label:'Beleške',color:'#7a4ff7'},
    {key:'shopping',icon:'🛒',label:'Kupovina',color:'#4fd97a'},
  ];
  document.getElementById('notes-content').innerHTML=cats.map(cat=>{
    const exp=STATE.expanded[cat.key];
    const active=STATE.notes[cat.key].filter(n=>!n.done).length;
    const items=exp?STATE.notes[cat.key].map(item=>`
      <div class="note-item" id="note-${item.id}">
        <div class="check-box ${item.done?'done':''}" onclick="toggleNote('${cat.key}','${item.id}')">${item.done?'✓':''}</div>
        <span class="note-text ${item.done?'done':''}">${item.content}</span>
        <span class="del-btn" onclick="delNote('${cat.key}','${item.id}')">✕</span>
      </div>`).join(''):'';
    const addRow=exp?`<div class="add-row">
      <input class="add-input" id="ni-${cat.key}" placeholder="+ Dodaj ${cat.label.toLowerCase()}..." onkeydown="if(event.key==='Enter')addNote('${cat.key}')">
      <button class="add-btn" onclick="addNote('${cat.key}')" style="background:linear-gradient(135deg,${cat.color},${cat.color}bb);">+</button>
    </div>`:'';
    return`<div>
      <div class="cat-header" onclick="toggleCat('${cat.key}')">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:16px">${cat.icon}</span>
          <span style="font-weight:600;color:var(--tx);font-size:13px">${cat.label}</span>
          <span class="cat-badge" style="background:${cat.color}22;color:${cat.color}">${active}</span>
        </div>
        <span style="color:var(--txm);font-size:12px">${exp?'▾':'▸'}</span>
      </div>
      ${items}${addRow}
    </div>`;
  }).join('');
}
function toggleCat(key){STATE.expanded[key]=!STATE.expanded[key];renderNotes();}
function toggleNote(cat,id){
  const n=STATE.notes[cat].find(x=>x.id===id);if(n)n.done=!n.done;renderNotes();
}
function delNote(cat,id){STATE.notes[cat]=STATE.notes[cat].filter(x=>x.id!==id);renderNotes();}
function addNote(cat){
  const inp=document.getElementById('ni-'+cat);
  const val=(inp?.value||'').trim();
  if(val){STATE.notes[cat].unshift({id:uid(),content:val,done:false});renderNotes();}
}

// ─── RENDER ALARMS ────────────────────────────────────────────────────────────
const DAY_L=['N','P','U','S','Č','Pe','Su'];
function renderAlarms(){
  const ac=document.getElementById('alarms-content');
  const alarmHtml=STATE.alarms.map(a=>`
    <div class="alarm-card ${a.on?'on':''}">
      <div style="flex:1">
        <div class="alarm-label ${a.on?'on':''}">${a.label}</div>
        <div class="alarm-time ${a.on?'on':''}">${a.time}</div>
        <div class="day-pills">${DAY_L.map((d,i)=>`<div class="day-pill ${a.days[i]?'on':''}" onclick="toggleAlarmDay('${a.id}',${i})">${d}</div>`).join('')}</div>
        ${a.createdByAI?'<span class="ai-badge">🤖 AI</span>':''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div class="toggle ${a.on?'on':''}" onclick="toggleAlarm('${a.id}')">
          <div class="toggle-knob" style="left:${a.on?'22px':'3px'}"></div>
        </div>
        <span class="del-btn" onclick="delAlarm('${a.id}')">✕</span>
      </div>
    </div>`).join('');
  const remHtml=STATE.reminders.map(r=>`
    <div class="reminder-card ${r.done?'done':''}">
      <div class="check-box ${r.done?'done':''}" onclick="toggleReminder('${r.id}')">${r.done?'✓':''}</div>
      <div style="flex:1">
        <div style="font-size:12.5px;color:var(--tx);font-weight:500;text-decoration:${r.done?'line-through':'none'}">${r.title}</div>
        <div style="font-size:11px;color:#4f8ef7">${fmtDate(r.date)} · ${r.time}</div>
      </div>
      <span class="prio-tag prio-${r.priority}">${r.priority}</span>
      <span class="del-btn" onclick="delReminder('${r.id}')">✕</span>
    </div>`).join('');
  ac.innerHTML=`
    <div class="sec-label">⏰ Alarmi</div>${alarmHtml}
    <div class="sec-label" style="margin-top:14px">🔔 Podsetnici</div>${remHtml}
    <div style="background:var(--card);box-shadow:var(--sh);border-radius:16px;padding:12px;margin-top:14px;margin-bottom:20px">
      <div class="sec-label" style="margin-top:0">+ Novi alarm</div>
      <div style="display:flex;gap:7px">
        <input type="time" id="new-alarm-time" value="08:00" style="flex:1;border:none;background:var(--inp);box-shadow:var(--shin);border-radius:10px;padding:8px 10px;font-size:13px;color:var(--tx);outline:none;">
        <input id="new-alarm-label" placeholder="Naziv..." style="flex:2;border:none;background:var(--inp);box-shadow:var(--shin);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--tx);outline:none;font-family:'DM Sans',sans-serif;">
        <button onclick="addAlarm()" style="width:36px;height:36px;border-radius:10px;border:none;background:linear-gradient(135deg,#4f8ef7,#7ab8ff);box-shadow:2px 2px 8px #2a6bd4;font-size:16px;cursor:pointer;color:#fff;">+</button>
      </div>
    </div>`;
}
function toggleAlarm(id){const a=STATE.alarms.find(x=>x.id===id);if(a)a.on=!a.on;renderAlarms();}
function toggleAlarmDay(id,i){const a=STATE.alarms.find(x=>x.id===id);if(a){a.days[i]=a.days[i]?0:1;}renderAlarms();}
function delAlarm(id){STATE.alarms=STATE.alarms.filter(x=>x.id!==id);renderAlarms();}
function toggleReminder(id){const r=STATE.reminders.find(x=>x.id===id);if(r)r.done=!r.done;renderAlarms();}
function delReminder(id){STATE.reminders=STATE.reminders.filter(x=>x.id!==id);renderAlarms();}
function addAlarm(){
  const t=document.getElementById('new-alarm-time')?.value;
  const l=document.getElementById('new-alarm-label')?.value||'Alarm';
  if(t){STATE.alarms.unshift({id:uid(),label:l,time:t,on:true,days:[0,0,0,0,0,0,0],createdByAI:false});renderAlarms();}
}

// ─── RENDER CALENDAR ──────────────────────────────────────────────────────────
function renderCalendar(){
  const sorted=[...STATE.events].sort((a,b)=>a.date>b.date?1:-1);
  const up=sorted.filter(e=>e.date>=todayStr());
  const past=sorted.filter(e=>e.date<todayStr());
  const evHtml=ev=>`
    <div class="event-card" style="border-left:3px solid ${ev.color}">
      <div class="event-dot" style="background:${ev.color}22">${ev.date<todayStr()?'📋':'📅'}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--tx)">${ev.title}</div>
        <div style="font-size:11px;color:${ev.color};margin-top:1px;font-weight:600">${fmtDate(ev.date)} · ${ev.time}</div>
        ${ev.person?`<div style="font-size:11px;color:var(--txs)">👤 ${ev.person}</div>`:''}
      </div>
      <span class="del-btn" onclick="delEvent('${ev.id}')">✕</span>
    </div>`;
  const cc=document.getElementById('calendar-content');
  cc.innerHTML=`
    <div class="sec-label">📅 Predstojeće</div>
    ${up.length?up.map(evHtml).join(''):'<div style="color:var(--txm);font-size:12px;text-align:center;padding:20px">Nema predstojećih događaja.<br>Reci ARIA-i da doda! 💬</div>'}
    ${past.length?`<div class="sec-label" style="margin-top:12px">Prošlo</div>${past.map(evHtml).join('')}`:''}
    <div style="height:20px"></div>`;
}
function delEvent(id){STATE.events=STATE.events.filter(x=>x.id!==id);renderCalendar();}

// ─── RENDER SETTINGS ──────────────────────────────────────────────────────────
function renderSettings(){
  const contactsHtml=STATE.contacts.map((c,i)=>`
    <div class="contact-row" style="${i===STATE.contacts.length-1?'border-bottom:none':''}">
      <span style="font-size:18px">${c.emoji}</span>
      <div style="flex:1">
        <div style="font-size:12.5px;color:var(--tx);font-weight:500">${c.name}</div>
        <div style="font-size:11px;color:var(--txs)">${c.phone}</div>
      </div>
      <a href="tel:${c.phone.replace(/\s/g,'')}" style="text-decoration:none;font-size:18px">📞</a>
      <span class="del-btn" onclick="delContact('${c.id}')">✕</span>
    </div>`).join('');
  const memHtml=STATE.memories.map((m,i)=>`
    <div class="mem-row" style="${i===STATE.memories.length-1?'border-bottom:none':''}">
      <span style="font-size:12px;color:var(--txs)">${m.key}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:12px;color:var(--tx);font-weight:500">${m.value}</span>
        <span class="del-btn" onclick="delMemory('${m.id}')">✕</span>
      </div>
    </div>`).join('');
  const calcHtml=STATE.calcHistory.slice(0,5).map((c,i)=>`
    <div class="calc-row" style="${i===Math.min(STATE.calcHistory.length,5)-1?'border-bottom:none':''}">
      <span style="color:var(--txs)">${c.expr}</span>
      <span style="color:#4f8ef7;font-weight:700">= ${c.result}</span>
    </div>`).join('');

  document.getElementById('settings-content').innerHTML=`
    <div class="sec-label">🤖 AI Mod</div>
    <div class="settings-section">
      <div class="seg-btns">
        <button class="seg-btn ${STATE.aiMode==='groq'?'active':''}" onclick="setAIMode('groq')">🤖 Groq AI</button>
        <button class="seg-btn ${STATE.aiMode==='offline'?'active':''}" onclick="setAIMode('offline')">📴 Offline</button>
      </div>
      <div class="status-bar ${STATE.isOnline?'online':'offline'}" id="status-bar">
        ${STATE.isOnline?'🟢 Internet: povezan':'🔴 Nema interneta — auto offline mod'}
      </div>
      <div id="key-section" style="display:${STATE.aiMode==='groq'?'block':'none'}">
        <div style="font-size:11px;color:var(--txs);margin-top:10px;margin-bottom:5px">Groq API ključ</div>
        <div class="key-row">
          <input class="key-input" type="password" id="groq-key-inp" value="${STATE.groqKey}" placeholder="gsk_...">
          <button class="save-btn" onclick="saveKey()">Sačuvaj</button>
        </div>
        <div class="hint">Besplatni ključ: <b>console.groq.com</b> · čuva se lokalno</div>
      </div>
    </div>

    <div class="sec-label">🔊 Glasovni odgovori (TTS)</div>
    <div class="settings-section" style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;color:var(--tx)">Govori odgovore glasom</span>
      <div class="toggle ${STATE.ttsEnabled?'on':''}" onclick="toggleTTSSetting()">
        <div class="toggle-knob" style="left:${STATE.ttsEnabled?'22px':'3px'}"></div>
      </div>
    </div>

    <div class="sec-label">🎨 Tema</div>
    <div class="settings-section">
      <div class="seg-btns">
        <button class="seg-btn ${STATE.theme==='light'?'active':''}" onclick="setTheme('light')">☀️ Light</button>
        <button class="seg-btn ${STATE.theme==='dark'?'active':''}" onclick="setTheme('dark')">🌙 Dark</button>
        <button class="seg-btn ${STATE.theme==='amoled'?'active':''}" onclick="setTheme('amoled')">⬛ AMOLED</button>
      </div>
    </div>

    <div class="sec-label">📞 Kontakti (${STATE.contacts.length})</div>
    <div class="settings-section">
      ${contactsHtml}
      <div class="add-row" style="margin-top:10px">
        <input class="add-input" id="nc-name" placeholder="Ime...">
        <input class="add-input" id="nc-phone" placeholder="Telefon...">
        <button class="add-btn" onclick="addContact()" style="background:linear-gradient(135deg,#4f8ef7,#7ab8ff);width:34px;height:34px;">+</button>
      </div>
    </div>

    ${STATE.calcHistory.length?`
    <div class="sec-label">🧮 Kalkulator — istorija</div>
    <div class="settings-section">${calcHtml}</div>`:''}

    <div class="sec-label">🧠 Memorija (${STATE.memories.length})</div>
    <div class="settings-section">
      ${STATE.memories.length?memHtml:'<div style="font-size:12px;color:var(--txm)">Nema zapamćenih informacija.</div>'}
    </div>
    <div style="height:20px"></div>`;
}
function setAIMode(m){
  if(m==='groq'&&!STATE.isOnline){alert('Nema interneta!');return;}
  STATE.aiMode=m;
  document.getElementById('key-section').style.display=m==='groq'?'block':'none';
  updateHeader();renderSettings();
}
function saveKey(){
  const k=document.getElementById('groq-key-inp')?.value||'';
  STATE.groqKey=k;localStorage.setItem('aria_groq_key',k);
  updateHeader();renderSettings();
}
function toggleTTSSetting(){
  STATE.ttsEnabled=!STATE.ttsEnabled;
  const btn=document.getElementById('tts-btn');
  btn.classList.toggle('active',STATE.ttsEnabled);
  btn.textContent=STATE.ttsEnabled?'🔈':'🔇';
  renderSettings();
}
function delContact(id){STATE.contacts=STATE.contacts.filter(x=>x.id!==id);renderSettings();}
function addContact(){
  const n=document.getElementById('nc-name')?.value||'';
  const p=document.getElementById('nc-phone')?.value||'';
  if(n&&p){STATE.contacts.push({id:uid(),name:n,phone:p,emoji:'👤'});renderSettings();}
}
function delMemory(id){STATE.memories=STATE.memories.filter(x=>x.id!==id);renderSettings();}

// ─── THEME ────────────────────────────────────────────────────────────────────
function setTheme(t){
  STATE.theme=t;
  document.body.className=t==='light'?'':t;
  renderSettings();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function goPage(name){
  STATE.currentPage=name;
  ['chat','notes','alarms','calendar','settings'].forEach(p=>{
    document.getElementById('page-'+p).style.display=p===name?(p==='chat'?'flex':'flex'):'none';
    document.getElementById('nav-'+p).classList.toggle('active',p===name);
  });
  if(name==='notes')renderNotes();
  if(name==='alarms')renderAlarms();
  if(name==='calendar')renderCalendar();
  if(name==='settings')renderSettings();
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function updateHeader(){
  const groqActive=STATE.aiMode==='groq'&&STATE.groqKey&&STATE.isOnline;
  document.getElementById('header-sub').textContent=`${groqActive?'🤖 Groq AI':'📴 Offline'} · ${fmtTime()}${STATE.isSpeaking?' 🔊':''}`;
  const pill=document.getElementById('mode-pill');
  pill.textContent=groqActive?'🤖 Groq':'📴 Offline';
  pill.classList.toggle('active',groqActive);
  const dot=document.getElementById('conn-dot');
  dot.classList.toggle('off',!STATE.isOnline);
}

// ─── ONLINE STATUS ────────────────────────────────────────────────────────────
window.addEventListener('online',()=>{STATE.isOnline=true;updateHeader();});
window.addEventListener('offline',()=>{STATE.isOnline=false;if(STATE.aiMode==='groq')STATE.aiMode='offline';updateHeader();});

// ─── CLOCK ────────────────────────────────────────────────────────────────────
setInterval(updateHeader,15000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.speechSynthesis?.getVoices();
renderChat();
updateHeader();
</script>
</body>
</html>
